name: Heartbeat Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .heartbeat
            state/

      - name: Write heartbeat
        run: >-
          python3 - << 'PYEOF'
          from datetime import datetime, timezone
          import json
          ts = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')
          with open('.heartbeat', 'w') as f:
              json.dump({'last_heartbeat': ts}, f)
          print('Heartbeat written:', ts)
          PYEOF

      - name: Check stale
        run: >-
          python3 - << 'PYEOF'
          import json, sys
          from datetime import datetime, timezone
          try:
              with open('.heartbeat') as f:
                  prev = json.load(f)
              prev_ts = prev.get('last_heartbeat', '')
              if prev_ts:
                  pt = datetime.fromisoformat(prev_ts.replace('Z', '+00:00'))
                  age = (datetime.now(timezone.utc) - pt).total_seconds()
                  print('Heartbeat age:', age, 'seconds')
                  if age > 900:
                      print('STALE - more than 15 minutes old')
                      sys.exit(1)
              print('OK')
          except Exception as e:
              print('Error:', e)
              sys.exit(0)
          PYEOF
        continue-on-error: true

      - name: Create issue if stale
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: 'andrebrassfield',
              repo: 'hermes-watchdog',
              title: '[CRITICAL] Sandbox heartbeat stale -- ' + new Date().toISOString().slice(0,10),
              body: '## Sandbox Heartbeat Stale

MaxHermes sandbox may be down.',
              labels: ['watchdog-critical']
            })
