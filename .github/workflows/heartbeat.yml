name: Heartbeat Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: ~

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .heartbeat

      - name: Run heartbeat
        run: |
          python3 -c "
import json, os
from datetime import datetime, timezone

# Read previous heartbeat
prev_ts = None
try:
    with open('.heartbeat') as f:
        prev = json.load(f)
        prev_ts = prev.get('last_heartbeat', '')
except:
    pass

# Current time
now = datetime.now(timezone.utc)
now_ts = now.isoformat().replace('+00:00', 'Z')

# Compute missed
missed = 0
if prev_ts:
    try:
        pt = datetime.fromisoformat(prev_ts.replace('Z', '+00:00'))
        age = (now - pt).total_seconds()
        missed = max(0, int(age // 300) - 1)
    except:
        pass

print(f'Heartbeat: {now_ts}')
print(f'Previous: {prev_ts}')
print(f'Missed intervals: {missed}')
print(f'::set-output name=timestamp::{now_ts}')
print(f'::set-output name=missed::{missed}')
print(f'::set-output name=prev::{prev_ts or "null"}')
"

      - name: Check stale
        if: steps.heartbeat.outputs.missed >= 2
        run: |
          echo "WARNING: ${{ steps.heartbeat.outputs.missed }} consecutive misses"

      - name: Create issue on stale
        if: steps.heartbeat.outputs.missed >= 3
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: 'andrebrassfield',
              repo: 'hermes-watchdog',
              title: '[CRITICAL] Sandbox heartbeat stale -- ' + new Date().toISOString().slice(0,10),
              body: '## Critical: Sandbox Heartbeat Stale

**Missed:** ' + ${{ steps.heartbeat.outputs.missed }} + '
**Last heartbeat:** ' + ('${{ steps.heartbeat.outputs.prev }}' || 'none') + '

MaxHermes sandbox may be down.',
              labels: ['watchdog-critical']
            })
