name: Heartbeat Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: ~

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .heartbeat
            state/

      - name: Write heartbeat
        run: python3 -c "from datetime import datetime, timezone; import json; f=open('.heartbeat','w'); json.dump({'last_heartbeat': datetime.now(timezone.utc).isoformat().replace('+00:00','Z')}, f); f.close(); print('heartbeat written')"

      - name: Check stale
        run: python3 -c "import json,sys; from datetime import datetime, timezone; prev_ts=None; [prev_ts:=json.loads(l).get('last_heartbeat',prev_ts) for l in open('.heartbeat')]; print('prev:', prev_ts); [sys.exit(1) if prev_ts and (datetime.now(timezone.utc)-datetime.fromisoformat(prev_ts.replace('Z','+00:00'))).total_seconds()>900 else None for l in [None]]; sys.exit(0)"
        continue-on-error: true

      - name: Create issue if stale
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: 'andrebrassfield',
              repo: 'hermes-watchdog',
              title: '[CRITICAL] Sandbox heartbeat stale -- ' + new Date().toISOString().slice(0,10),
              body: '## Sandbox Heartbeat Stale\n\nMaxHermes sandbox may be down.',
              labels: ['watchdog-critical']
            })
