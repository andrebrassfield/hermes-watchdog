name: Heartbeat Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .heartbeat
            state/

      - name: Read previous heartbeat
        id: prev
        run: |
          if [ -f .heartbeat ]; then
            PREV=$(cat .heartbeat)
            echo "prev=${PREV}" >> $GITHUB_OUTPUT
            echo "has_prev=true" >> $GITHUB_OUTPUT
          else
            echo "has_prev=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute missed heartbeats
        id: compute
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "timestamp=${NOW}" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT

          MISSED=0
          if [ "${{ steps.prev.outputs.has_prev }}" == "true" ]; then
            AGE=$(python3 -c "
import json, datetime
try:
    prev = json.loads('''${{ steps.prev.outputs.prev }}''')
    last = prev.get('last_heartbeat', '')
    if last:
        lt = datetime.datetime.fromisoformat(last.replace('Z','+00:00'))
        now = datetime.datetime.now(datetime.timezone.utc)
        print(int((now - lt).total_seconds()))
    else:
        print(0)
except:
    print(0)
")
            if [ -n "$AGE" ] && [ "$AGE" -gt 300 ]; then
              MISSED=$(( AGE / 300 - 1 ))
              if [ "$MISSED" -lt 0 ]; then MISSED=0; fi
            fi
          fi
          echo "missed=${MISSED}" >> $GITHUB_OUTPUT
          echo "age_sec=${AGE:-0}" >> $GITHUB_OUTPUT

      - name: Log heartbeat
        run: |
          echo "Heartbeat: ${{ steps.compute.outputs.timestamp }}"
          echo "Consecutive misses: ${{ steps.compute.outputs.missed }}"

      - name: Check stale heartbeat
        if: ${{ steps.compute.outputs.missed >= 2 }}
        run: |
          echo "WARNING: ${{ steps.compute.outputs.missed }} consecutive misses detected"
          echo "Sandbox may be unresponsive"

      - name: Create issue on stale heartbeat
        if: ${{ steps.compute.outputs.missed >= 3 }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: 'andrebrassfield',
              repo: 'hermes-watchdog',
              title: '[CRITICAL] Sandbox heartbeat stale -- ' + new Date().toISOString().slice(0,10),
              body: '## Critical: Sandbox Heartbeat Stale

**Consecutive misses:** ' + ${{ steps.compute.outputs.missed }} + '
**Last heartbeat:**
```
' + ('${{ steps.prev.outputs.prev }}' || 'none') + '
```

This likely means the MaxHermes sandbox is down or unreachable.

**Manual intervention required.**',
              labels: ['watchdog-critical']
            })
