name: Heartbeat Monitor
# Every 5 minutes -- checks if the agent is responsive
# This workflow is READ-ONLY -- it only reads state and creates issues

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .heartbeat
            state/

      - name: Read previous heartbeat
        id: prev
        run: |
          if [ -f .heartbeat ]; then
            PREV=$(cat .heartbeat)
            echo "prev=$PREV" >> $GITHUB_OUTPUT
            echo "has_prev=true" >> $GITHUB_OUTPUT
          else
            echo "has_prev=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute heartbeat
        id: heartbeat
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "timestamp=$NOW" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT

          if [ "${{ steps.prev.outputs.has_prev }}" == "true" ]; then
            python3 << 'PYEOF'
            import json, sys, datetime
            prev = json.loads('''${{ steps.prev.outputs.prev }}''')
            last_ts = prev.get("last_heartbeat", "")
            if last_ts:
                try:
                    last_time = datetime.datetime.fromisoformat(last_ts.replace("Z", "+00:00"))
                    now = datetime.datetime.now(datetime.timezone.utc)
                    age = (now - last_time).total_seconds()
                    missed = max(0, (age // 300) - 1)
                    print(f"missed={missed}", file=sys.stderr)
                    print(f"age_sec={int(age)}", file=sys.stderr)
                    with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                        f.write(f"missed={missed}\n")
                        f.write(f"age_sec={int(age)}\n")
                except Exception as e:
                    print(f"Error: {e}", file=sys.stderr)
                    with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                        f.write("missed=0\nage_sec=0\n")
            else:
                with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                    f.write("missed=0\nage_sec=0\n")
          else:
            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                f.write("missed=0\nage_sec=0\n")
          PYEOF
          else
            echo "missed=0" >> $GITHUB_OUTPUT
            echo "age_sec=0" >> $GITHUB_OUTPUT
          fi

      - name: Log heartbeat
        run: |
          echo "Heartbeat: ${{ steps.heartbeat.outputs.timestamp }}"
          echo "Consecutive misses: ${{ steps.heartbeat.outputs.missed }}"
          echo "Run ID: ${{ steps.heartbeat.outputs.run_id }}"

      - name: Check stale heartbeat
        if: ${{ steps.heartbeat.outputs.missed >= 2 }}
        run: |
          echo "WARNING: ${{ steps.heartbeat.outputs.missed }} consecutive misses detected"
          echo "Sandbox may be unresponsive"

      - name: Create issue on stale heartbeat
        if: ${{ steps.heartbeat.outputs.missed >= 3 }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: 'andrebrassfield',
              repo: 'hermes-watchdog',
              title: '[CRITICAL] Sandbox heartbeat stale -- ' + new Date().toISOString().slice(0,10),
              body: '## Critical: Sandbox Heartbeat Stale

**Consecutive misses:** ' + ${{ steps.heartbeat.outputs.missed }} + '
**Last heartbeat:** ${{ steps.prev.outputs.prev }}' + '
**Run ID:** ${{ steps.heartbeat.outputs.run_id }}' + '

This likely means the MaxHermes sandbox is down or unreachable.

**Manual intervention required.**

---
*Auto-created by hermes-watchdog heartbeat monitor*',
              labels: ['watchdog-critical']
            })
