name: Watchdog Timer
# Every 10 minutes -- logs that the watchdog system is running
# This is a keepalive marker and log aggregator
# The actual circuit breaker lives in the agent (src/circuit_breaker.py)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  timer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log watchdog timer
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          
          # Read latest state if available
          context_pct = 0
          try:
              with open("state/latest.jsonl") as f:
                  lines = f.readlines()
              if lines:
                  last = json.loads(lines[-1])
                  context_pct = last.get("context_percent", 0)
          except:
              pass

          print(f"[{now}] Watchdog timer fired -- context: {context_pct}%")
          print(f"Run ID: {os.environ.get('GITHUB_RUN_ID', 'manual')}")
          
          # This is just a keepalive -- always succeeds
          # The real monitoring is done by:
          #   - context-monitor.yml (every 2 min)
          #   - heartbeat.yml (every 5 min)
          #   - src/circuit_breaker.py (inside agent)
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
