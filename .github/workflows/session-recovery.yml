name: Session Recovery
# Triggered manually or by alert webhook when CRITICAL is detected
# Backs up state, creates rescue branch, attempts graceful recovery

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session ID to recover'
        required: false
        type: string
      reason:
        description: 'Reason for recovery'
        required: false
        default: 'manual'
        type: string
  repository_dispatch:
    types: [watchdog-critical, watchdog-rescue]

jobs:
  rescue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read latest snapshot
        id: snapshot
        run: |
          mkdir -p snapshots
          # Find most recent snapshot
          if ls snapshots/*.json 1> /dev/null 2>&1; then
            LATEST=$(ls -t snapshots/*.json | head -1)
            echo "snapshot=$LATEST" >> $GITHUB_OUTPUT
            echo "Found: $LATEST"
            cat "$LATEST"
          else
            echo "No snapshots found"
          fi

      - name: Create rescue branch
        if: ${{ steps.snapshot.outputs.snapshot != '' }}
        run: |
          BRANCH="rescue/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create incident report
        if: ${{ steps.snapshot.outputs.snapshot != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.snapshot.outputs.branch }}'
            github.rest.issues.create({
              owner: 'andrebrassfield',
              repo: 'hermes-watchdog',
              title: `🚑 RECOVERY: Session rescued — ${new Date().toISOString().slice(0,10)}`,
              body: `## 🚑 Rescue Report

**Trigger:** ${{ github.event.inputs.reason || 'CRITICAL alert' }}
**Session:** ${{ github.event.inputs.session_id || 'unknown' }}
**Time:** ${new Date().toISOString()}
**Branch:** ${branch}

**Snapshot:** ${{ steps.snapshot.outputs.snapshot }}

### What happened
<!-- Fill in what you find from the snapshot -->

### Resolution
<!-- How was it resolved -->

---
*Auto-created by hermes-watchdog session recovery*`,
              labels: ['watchdog-recovered']
            })

      - name: Push rescue branch
        if: ${{ steps.snapshot.outputs.snapshot != '' }}
        run: |
          git config user.name "hermes-watchdog"
          git config user.email "watchdog@hermes.ai"
          git add -A
          git commit -m "rescue: session state backup $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin "$BRANCH"
