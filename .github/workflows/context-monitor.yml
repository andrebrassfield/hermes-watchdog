name: Context Monitor
# Every 2 minutes -- reads agent state from the repo (pushed by agent)
# Fires alerts based on context % thresholds
# Creates GitHub Issues on high context (no Telegram creds needed here)

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  context-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run context monitor
        id: monitor
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          STATE_FILE = "state/latest.jsonl"
          TELEGRAM_BOT_TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          TELEGRAM_CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID", "")
          GITHUB_REPO = "andrebrassfield/hermes-watchdog"

          def send_telegram(msg):
              if not TELEGRAM_BOT_TOKEN or not TELEGRAM_CHAT_ID:
                  print("WARNING: Telegram not configured -- skipping alert")
                  return False
              import urllib.request, urllib.parse
              url = f"https://api.telegram.org/bot{TELEGRAM_BOT_TOKEN}/sendMessage"
              data = {"chat_id": TELEGRAM_CHAT_ID, "text": msg, "parse_mode": "Markdown"}
              req = urllib.request.Request(
                  url,
                  data=urllib.parse.urlencode(data).encode(),
                  headers={"Content-Type": "application/x-www-form-urlencoded"},
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read()).get("ok", False)
              except Exception as e:
                  print(f"Telegram error: {e}")
                  return False

          def create_github_issue(title, body, labels):
              if not os.environ.get("GITHUB_TOKEN"):
                  print("WARNING: GITHUB_TOKEN not set -- cannot create issue")
                  return False
              import urllib.request
              url = f"https://api.github.com/repos/{GITHUB_REPO}/issues"
              data = json.dumps({"title": title, "body": body, "labels": labels})
              req = urllib.request.Request(
                  url,
                  data=data.encode(),
                  headers={
                      "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json"
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"GitHub issue error: {e}")
                  return False

          # Thresholds
          WATCH_PCT = 50
          WARN_PCT = 65
          ALERT_PCT = 80
          CRITICAL_PCT = 90

          # Read state
          context_pct = 0
          last_ts = None
          tool_active = False

          try:
              with open(STATE_FILE) as f:
                  lines = f.readlines()
              if lines:
                  last = json.loads(lines[-1])
                  context_pct = last.get("context_percent", 0)
                  last_ts = last.get("ts", "")
                  tool_active = last.get("tool_call_active", False)
          except FileNotFoundError:
              print(f"State file {STATE_FILE} not found -- agent may not be running")
              sys.exit(0)
          except Exception as e:
              print(f"Error reading state: {e}")
              sys.exit(0)

          now = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          print(f"Context: {context_pct}% | Tool active: {tool_active} | Last: {last_ts}")

          # Determine level
          if context_pct >= CRITICAL_PCT:
              level = "CRITICAL"
          elif context_pct >= ALERT_PCT:
              level = "ALERT"
          elif context_pct >= WARN_PCT:
              level = "WARN"
          elif context_pct >= WATCH_PCT:
              level = "WATCH"
          else:
              level = "OK"
              print(f"[OK] Context nominal: {context_pct}%")
              sys.exit(0)

          emoji = {"WATCH": "黄", "WARN": "橙", "ALERT": "红", "CRITICAL": "爆"}.get(level, "!")
          msg = f"*[{level}] Context Monitor -- {now}*

Context: {context_pct}%
Last activity: {last_ts}
Tool active: {tool_active}

Action: {'Immediate!' if level in ('ALERT', 'CRITICAL') else 'Monitor closely'}"

          print(f"ALERT: {level} -- Context at {context_pct}%")

          # Try to send Telegram (will silently fail if no creds)
          sent = send_telegram(msg)

          # Create GitHub Issue on ALERT+
          if level in ("ALERT", "CRITICAL") and context_pct >= ALERT_PCT:
              labels = ["watchdog-alert"] if level == "ALERT" else ["watchdog-critical"]
              title = f"[{level}] Context at {context_pct}% -- {now[:16]}"
              body = f"## {level}: Context Saturation

**Context:** {context_pct}%
**Last activity:** {last_ts}
**Tool active:** {tool_active}
**Time:** {now}

Context is above {ALERT_PCT}%.

**Action:**
1. Check Telegram for alert
2. If agent is unresponsive, consider /reset
3. Review state/latest.jsonl for full history

*Auto-created by hermes-watchdog context monitor*"

              result = create_github_issue(title, body, labels)
              if result:
                  print(f"GitHub Issue created: {result.get('html_url', '')}")
              else:
                  print("WARNING: Could not create GitHub Issue")

          # Exit with error so GitHub shows failure (expected for ALERT/CRITICAL)
          sys.exit(0 if level in ("WATCH", "OK") else 1)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
