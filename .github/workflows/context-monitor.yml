name: Context Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            state/
            src/

      - name: Check context
        run: |
          python3 - << 'PYEOF'
          import json, sys
          try:
              with open("state/latest.jsonl") as f:
                  lines = f.readlines()
              if lines:
                  last = json.loads(lines[-1])
                  pct = last.get("context_percent", 0)
                  print(f"Context: {pct}%")
                  if pct >= 80:
                      print("HIGH")
                      sys.exit(1)
              print("OK")
          except FileNotFoundError:
              print("No state file")
              sys.exit(0)
          except Exception as e:
              print(f"Error: {e}")
              sys.exit(0)
          PYEOF
        continue-on-error: true

      - name: Alert on high context
        if: failure()
        run: echo "Context high -- Telegram alert would fire here"
